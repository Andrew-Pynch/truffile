metadata:
  name: Kalshi
  bundle_id: org.deepshard.kalshi
  description: |
    Have Truffle Trade and monitor Kalshi prediction markets for you.
  icon_file: ./icon.png
  background:
    process:
      cmd:
        - python
        - kalshi_background.py
      working_directory: /
      environment:
        PYTHONUNBUFFERED: "1"
    default_schedule:
      type: interval
      interval:
        duration: 30m
        prod_duration: 60m
        schedule:
        daily_window: "00:00-23:59"
  foreground:
    process:
      cmd:
        - python
        - kalshi_foreground.py
      working_directory: /
      environment:
        PYTHONUNBUFFERED: "1"

steps:
  # - name: Welcome
  #   type: welcome
  #   content: |
  #     Welcome to Kalshi for Truffle.

  #     This app lets your Truffle trade prediction markets, monitor
  #     positions, and get alerts on price changes and settlements.

  - name: Install dependencies
    type: bash
    run: |
      apk add --no-cache gcc musl-dev libffi-dev openssl-dev
      pip install --no-cache-dir "httpx>=0.27.0" "cryptography>=42.0.0"

  - name: Copy application files
    type: files
    files:
      - source: ./config.py
        destination: ./config.py
      - source: ./client.py
        destination: ./client.py
      - source: ./bg_worker.py
        destination: ./bg_worker.py
      - source: ./kalshi_foreground.py
        destination: ./kalshi_foreground.py
      - source: ./kalshi_background.py
        destination: ./kalshi_background.py

  - name: Configure Kalshi API credentials
    type: text
    ui_state_on_show: user_interaction_ready
    ui_state_on_complete: move_to_background
    content: |
      Kalshi lets your Truffle trade prediction markets, monitor
      positions, and get alerts on price changes and settlements.
      By installing this app you agree that Deepshard is not liable for any losses incurred.
      
      Enter your Kalshi API credentials.
      To get these:
      1. Go to https://kalshi.com/account/profile and log in
      2. Scroll down to the "API Keys" section and click "Create Key"
      3. Copy the API Key and Private Key
      4. Paste the API Key and Private Key into the fields below
    fields:
      - name: kalshi_api_key
        label: Kalshi API Key (UUID format)
        type: password
        placeholder: your key goes here
        env: KALSHI_API_KEY
      - name: kalshi_private_key
        label: Kalshi Private Key (RSA PEM)
        type: password
        placeholder: "-----BEGIN RSA PRIVATE KEY-----"
        env: KALSHI_PRIVATE_KEY
    validator:
      type: bash
      run: |
        python ./kalshi_background.py --verify
      timeout: 120
      error_message: |
        Could not authenticate with Kalshi using the provided credentials.
