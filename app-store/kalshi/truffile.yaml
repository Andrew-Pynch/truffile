metadata:
  name: Kalshi
  bundle_id: org.deepshard.kalshi
  description: |
    Have Truffle Trade and monitor Kalshi prediction markets for you.
  icon_file: ./icon.png
  background:
    process:
      cmd:
        - python
        - kalshi_background.py
      working_directory: /
      environment:
        PYTHONUNBUFFERED: "1"
        # Required secrets for Kalshi API auth.
        KALSHI_API_KEY: "REPLACE_WITH_KALSHI_API_KEY"
        # PEM private key. Use literal block style to preserve newlines.
        KALSHI_PRIVATE_KEY: |
          REPLACE_WITH_KALSHI_PRIVATE_KEY_PEM
    default_schedule:
      type: interval
      interval:
        duration: 30m
        prod_duration: 60m
        schedule:
        daily_window: "00:00-23:59"
  foreground:
    process:
      cmd:
        - python
        - kalshi_foreground.py
      working_directory: /
      environment:
        PYTHONUNBUFFERED: "1"
        # Required secrets for Kalshi API auth.
        KALSHI_API_KEY: "REPLACE_WITH_KALSHI_API_KEY"
        # PEM private key. Use literal block style to preserve newlines.
        KALSHI_PRIVATE_KEY: |
          REPLACE_WITH_KALSHI_PRIVATE_KEY_PEM

steps:
  - name: Install dependencies
    type: bash
    run: |
      apk add --no-cache gcc musl-dev libffi-dev openssl-dev
      pip install --no-cache-dir "httpx>=0.27.0" "cryptography>=42.0.0"

  - name: Copy application files
    type: files
    files:
      - source: ./config.py
        destination: ./config.py
      - source: ./client.py
        destination: ./client.py
      - source: ./bg_worker.py
        destination: ./bg_worker.py
      - source: ./kalshi_foreground.py
        destination: ./kalshi_foreground.py
      - source: ./kalshi_background.py
        destination: ./kalshi_background.py
